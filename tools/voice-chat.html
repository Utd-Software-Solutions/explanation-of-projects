<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أداة الصوت — UTD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --chat-bg: #e5ddd5;
            --header-bg: #075e54;
            --header-dark: #064e46;
            --sent-bubble: #dcf8c6;
            --system-bubble: #fff;
            --input-bg: #f0f0f0;
            --green: #25d366;
            --green-dark: #128c7e;
            --text: #303030;
            --text-light: #667781;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: var(--chat-bg);
            overflow: hidden;
        }

        .header {
            background: var(--header-bg);
            color: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            z-index: 10;
        }

        .header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--header-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .header-info { flex: 1; }

        .header-title {
            font-size: 1rem;
            font-weight: 600;
        }

        .header-subtitle {
            font-size: 0.75rem;
            opacity: 0.85;
            margin-top: 1px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .lang-select {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 0.8rem;
            cursor: pointer;
            direction: ltr;
        }

        .lang-select option { color: #333; background: white; }

        .btn-clear {
            background: none;
            border: none;
            color: rgba(255,255,255,0.8);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .btn-clear:hover { background: rgba(255,255,255,0.15); }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: var(--chat-bg);
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c9b99a' fill-opacity='0.07'%3E%3Ccircle cx='10' cy='10' r='1.5'/%3E%3Ccircle cx='30' cy='30' r='1'/%3E%3Ccircle cx='50' cy='50' r='1.5'/%3E%3C/g%3E%3C/svg%3E");
        }

        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.95rem;
            line-height: 1.6;
            position: relative;
            word-wrap: break-word;
            animation: slideIn 0.2s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-sent {
            background: var(--sent-bubble);
            align-self: flex-end;
            border-top-left-radius: 10px;
            border-top-right-radius: 2px;
        }

        .message-system {
            background: var(--system-bubble);
            align-self: center;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-light);
            padding: 6px 16px;
            border-radius: 8px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.08);
        }

        .message-text {
            color: var(--text);
            direction: rtl;
            text-align: right;
            unicode-bidi: plaintext;
        }

        .message-meta {
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: flex-end;
            margin-top: 4px;
        }

        .message-time {
            font-size: 0.68rem;
            color: var(--text-light);
        }

        .message-copied {
            font-size: 0.68rem;
            color: var(--green-dark);
            font-weight: 600;
        }

        .input-area {
            background: var(--input-bg);
            padding: 8px 10px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            flex-shrink: 0;
        }

        .input-wrapper {
            flex: 1;
            background: white;
            border-radius: 24px;
            display: flex;
            align-items: flex-end;
            padding: 4px 12px;
            min-height: 44px;
            border: 1px solid #ddd;
        }

        .input-text {
            flex: 1;
            border: none;
            outline: none;
            font-size: 0.95rem;
            line-height: 1.5;
            max-height: 120px;
            overflow-y: auto;
            padding: 8px 0;
            resize: none;
            font-family: inherit;
            direction: rtl;
            unicode-bidi: plaintext;
        }

        .btn-mic, .btn-send {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-mic {
            background: var(--green);
            color: white;
        }

        .btn-mic:hover { background: var(--green-dark); }

        .btn-mic.recording {
            background: var(--danger);
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
            50% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
        }

        .btn-send {
            background: var(--green);
            color: white;
        }

        .btn-send:hover { background: var(--green-dark); }
        .btn-send:disabled { background: #ccc; cursor: default; }

        .recording-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: #fef2f2;
            border-top: 1px solid #fecaca;
            font-size: 0.82rem;
            color: var(--danger);
            flex-shrink: 0;
        }

        .recording-indicator.active { display: flex; }

        .recording-indicator.mic-lost {
            background: #fffbeb;
            border-top-color: #fde68a;
            color: #b45309;
        }

        .recording-indicator.mic-lost .rec-dot {
            background: #f59e0b;
        }

        .rec-dot {
            width: 8px;
            height: 8px;
            background: var(--danger);
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .interim-text {
            color: #999;
            font-style: italic;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            gap: 12px;
            padding: 2rem;
        }

        .empty-state-icon {
            font-size: 3rem;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 0.95rem;
            text-align: center;
            line-height: 1.7;
        }

        .back-link {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            left: 8px;
            color: white;
            text-decoration: none;
            font-size: 1.3rem;
            padding: 6px;
            border-radius: 50%;
            display: flex;
            transition: background 0.2s;
        }

        .back-link:hover { background: rgba(255,255,255,0.15); }

        .not-supported {
            display: none;
            position: fixed;
            inset: 0;
            background: white;
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            padding: 2rem;
            text-align: center;
        }

        .not-supported.show { display: flex; }

        .not-supported h2 { color: var(--danger); font-size: 1.3rem; }
        .not-supported p { color: var(--text-light); line-height: 1.7; }

        @media (min-width: 600px) {
            body {
                max-width: 500px;
                margin: 0 auto;
                border-left: 1px solid #ccc;
                border-right: 1px solid #ccc;
            }
        }
    </style>
</head>
<body>

<div class="not-supported" id="notSupported">
    <h2>&#9888;&#65039; المتصفح غير مدعوم</h2>
    <p>المتصفح ده مش بيدعم تحويل الصوت لنص.<br>استخدم <strong>Google Chrome</strong> أو <strong>Microsoft Edge</strong> للتجربة الكاملة.</p>
</div>

<header class="header" style="position: relative;">
    <a href="../index.html" class="back-link" title="رجوع">&#8592;</a>
    <div class="header-avatar">&#127908;</div>
    <div class="header-info">
        <div class="header-title">أداة الصوت</div>
        <div class="header-subtitle" id="statusText">اضغط الميكروفون وابدأ اتكلم</div>
    </div>
    <div class="header-actions">
        <select class="lang-select" id="langSelect">
            <option value="ar-EG">مصري</option>
            <option value="ar-SA">سعودي</option>
            <option value="ar">عربي فصحى</option>
            <option value="en-US">English</option>
            <option value="fr-FR">Français</option>
            <option value="tr-TR">Türkçe</option>
            <option value="de-DE">Deutsch</option>
            <option value="es-ES">Español</option>
        </select>
        <button class="btn-clear" id="btnClear" title="مسح المحادثة">&#128465;</button>
    </div>
</header>

<div class="recording-indicator" id="recordingBar">
    <span class="rec-dot"></span>
    <span>جاري التسجيل... اتكلم براحتك</span>
</div>

<div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">&#127908;</div>
        <div class="empty-state-text">
            اضغط على الميكروفون وابدأ اتكلم<br>
            هيتحول كلامك لنص تلقائياً<br>
            ولما تبعت — هيتنسخ أوتوماتيك
        </div>
    </div>
</div>

<div class="input-area">
    <button class="btn-mic" id="btnMic" title="ابدأ تسجيل">&#127908;</button>
    <div class="input-wrapper">
        <textarea class="input-text" id="inputText" rows="1" placeholder="اتكلم أو اكتب هنا..."></textarea>
    </div>
    <button class="btn-send" id="btnSend" title="إرسال ونسخ" disabled>&#10148;</button>
</div>

<script>
(function() {
    var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        document.getElementById('notSupported').classList.add('show');
        return;
    }

    var chatArea = document.getElementById('chatArea');
    var emptyState = document.getElementById('emptyState');
    var inputText = document.getElementById('inputText');
    var btnMic = document.getElementById('btnMic');
    var btnSend = document.getElementById('btnSend');
    var btnClear = document.getElementById('btnClear');
    var langSelect = document.getElementById('langSelect');
    var statusText = document.getElementById('statusText');
    var recordingBar = document.getElementById('recordingBar');
    var recordingBarText = recordingBar.querySelector('span:last-child');

    var recognition = null;
    var isRecording = false;
    var prefixText = '';
    var micPermissionGranted = false;
    var reconnectAttempts = 0;
    var lastResultTime = 0;
    var proactiveTimer = null;
    var micStream = null;
    var rapidFailCount = 0;
    var lastFailTime = 0;

    // ===== English Terms Auto-Correction =====

    function tp(arabic) {
        var parts = arabic.trim().split(/\s+/);
        var p = parts.join('\\s+');
        p = p.replace(/[اإأآ]/g, '[اإأآ]');
        p = p.replace(/[يى]/g, '[يى]');
        return new RegExp(p, 'g');
    }

    var knownTerms = [
        // 5+ letter acronyms
        [tp('اتش تي تي بي اس'), 'HTTPS'],
        // 4-letter acronyms
        [tp('اتش تي تي بي'), 'HTTP'],
        [tp('اتش تي ام ال'), 'HTML'],
        [tp('جيه اس او ان'), 'JSON'],
        [tp('ار اي اس تي'), 'REST'],
        // 3-letter acronyms
        [tp('سي اس اس'), 'CSS'],
        [tp('اي بي اي'), 'API'],
        [tp('اي بي كي'), 'APK'],
        [tp('اس دي كي'), 'SDK'],
        [tp('يو آر ال'), 'URL'],
        [tp('يو ار ال'), 'URL'],
        [tp('بي دي اف'), 'PDF'],
        [tp('يو اس بي'), 'USB'],
        [tp('جي بي اس'), 'GPS'],
        [tp('اس اس ال'), 'SSL'],
        [tp('اس اس اتش'), 'SSH'],
        [tp('اس كيو ال'), 'SQL'],
        [tp('اكس ام ال'), 'XML'],
        [tp('بي اتش بي'), 'PHP'],
        [tp('يو تي دي'), 'UTD'],
        [tp('جي بي تي'), 'GPT'],
        [tp('ان بي ام'), 'NPM'],
        [tp('سي ال آي'), 'CLI'],
        [tp('سي ال اي'), 'CLI'],
        [tp('جي يو آي'), 'GUI'],
        [tp('جي يو اي'), 'GUI'],
        [tp('دي ان اس'), 'DNS'],
        [tp('سي دي ان'), 'CDN'],
        [tp('في بي ان'), 'VPN'],
        [tp('اف تي بي'), 'FTP'],
        [tp('تي سي بي'), 'TCP'],
        [tp('يو دي بي'), 'UDP'],
        [tp('او تي بي'), 'OTP'],
        [tp('جي سي بي'), 'GCP'],
        [tp('اي او اس'), 'iOS'],
        [tp('آي او اس'), 'iOS'],
        [tp('آي دي اي'), 'IDE'],
        [tp('اي دي اي'), 'IDE'],
        [tp('اي دبليو اس'), 'AWS'],
        [tp('اي دابليو اس'), 'AWS'],
        [tp('سي اس في'), 'CSV'],
        // 2-letter acronyms
        [tp('يو آي'), 'UI'],
        [tp('يو اي'), 'UI'],
        [tp('يو اكس'), 'UX'],
        [tp('اي آي'), 'AI'],
        [tp('آي تي'), 'IT'],
        [tp('اي تي'), 'IT'],
        [tp('كيو آر'), 'QR'],
        [tp('كيو ار'), 'QR'],
        [tp('في آر'), 'VR'],
        [tp('في ار'), 'VR'],
        [tp('اي آر'), 'AR'],
        [tp('اي ار'), 'AR'],
        [tp('آي بي'), 'IP'],
        [tp('اي بي'), 'IP'],
        // Multi-word tech terms
        [tp('جافا سكريبت'), 'JavaScript'],
        [tp('جافاسكريبت'), 'JavaScript'],
        [tp('تايب سكريبت'), 'TypeScript'],
        [tp('تايبسكريبت'), 'TypeScript'],
        [tp('مايكروسوفت'), 'Microsoft'],
        [tp('واتس اب'), 'WhatsApp'],
        [tp('فيس بوك'), 'Facebook'],
        [tp('انستجرام'), 'Instagram'],
        [tp('انستقرام'), 'Instagram'],
        [tp('واي فاي'), 'WiFi'],
        [tp('جيت هب'), 'GitHub'],
        [tp('قيت هب'), 'GitHub'],
        [tp('داتا بيس'), 'Database'],
        [tp('داتابيس'), 'Database'],
        [tp('ديتا بيس'), 'Database'],
        [tp('باك اند'), 'Backend'],
        [tp('باكاند'), 'Backend'],
        [tp('فرونت اند'), 'Frontend'],
        [tp('فرونتاند'), 'Frontend'],
        [tp('فريم ورك'), 'Framework'],
        [tp('فريمورك'), 'Framework'],
        // Single-word brands
        [tp('واتساب'), 'WhatsApp'],
        [tp('يوتيوب'), 'YouTube'],
        [tp('يوتوب'), 'YouTube'],
        [tp('فيسبوك'), 'Facebook'],
        [tp('تيليجرام'), 'Telegram'],
        [tp('تليجرام'), 'Telegram'],
        [tp('تلجرام'), 'Telegram'],
        [tp('تويتر'), 'Twitter'],
        [tp('جوجل'), 'Google'],
        [tp('قوقل'), 'Google'],
        [tp('اندرويد'), 'Android'],
        [tp('أندرويد'), 'Android'],
        [tp('آيفون'), 'iPhone'],
        [tp('ايفون'), 'iPhone'],
        [tp('آيباد'), 'iPad'],
        [tp('ايباد'), 'iPad'],
        [tp('لينكس'), 'Linux'],
        [tp('لينوكس'), 'Linux'],
        [tp('ويندوز'), 'Windows'],
        [tp('بايثون'), 'Python'],
        [tp('ريأكت'), 'React'],
        [tp('ريآكت'), 'React'],
        [tp('رياكت'), 'React'],
        [tp('فلاتر'), 'Flutter'],
        [tp('انجولار'), 'Angular'],
        [tp('أنجولار'), 'Angular'],
        [tp('بلوتوث'), 'Bluetooth'],
        [tp('دوكر'), 'Docker'],
        [tp('وايفاي'), 'WiFi'],
        [tp('جيسون'), 'JSON'],
        [tp('سيرفر'), 'Server'],
        [tp('كوتلن'), 'Kotlin'],
        [tp('سويفت'), 'Swift'],
        [tp('لارافيل'), 'Laravel'],
    ];

    var letterMap = {
        'بي': 'B', 'سي': 'C', 'دي': 'D',
        'اف': 'F', 'إف': 'F',
        'جي': 'G',
        'اتش': 'H', 'إتش': 'H', 'ايتش': 'H',
        'آي': 'I',
        'جيه': 'J',
        'كي': 'K', 'كاي': 'K',
        'إل': 'L',
        'ام': 'M', 'إم': 'M',
        'آر': 'R', 'أر': 'R', 'ار': 'R',
        'اس': 'S', 'إس': 'S',
        'تي': 'T',
        'يو': 'U',
        'دبليو': 'W', 'دابليو': 'W',
        'اكس': 'X', 'إكس': 'X',
        'واي': 'Y',
        'زد': 'Z', 'زي': 'Z',
        'كيو': 'Q',
        'اي': 'A',
        'ال': 'L', 'او': 'O', 'أو': 'O',
        'ان': 'N', 'إن': 'N',
        'في': 'V',
    };

    var ambiguousWords = new Set(['في', 'ال', 'او', 'أو', 'ان', 'إن', 'اي']);

    function detectLetterSequences(text) {
        var words = text.split(/\s+/);
        var result = [];
        var i = 0;
        while (i < words.length) {
            var seq = [];
            var safeCount = 0;
            var j = i;
            while (j < words.length && letterMap[words[j]] !== undefined) {
                seq.push(letterMap[words[j]]);
                if (!ambiguousWords.has(words[j])) safeCount++;
                j++;
            }
            if ((seq.length >= 3 && safeCount >= 2) || (seq.length >= 2 && safeCount >= 2)) {
                result.push(seq.join(''));
                i = j;
            } else {
                result.push(words[i]);
                i++;
            }
        }
        return result.join(' ');
    }

    function fixEnglishTerms(text) {
        if (!text) return text;
        for (var i = 0; i < knownTerms.length; i++) {
            text = text.replace(knownTerms[i][0], knownTerms[i][1]);
        }
        text = detectLetterSequences(text);
        return text;
    }

    function isArabicLang() {
        return langSelect.value.startsWith('ar');
    }

    // ===== Audio =====

    var audioCtx = null;
    function playBeep(type) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            var osc = audioCtx.createOscillator();
            var gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            if (type === 'failed') {
                osc.frequency.value = 300;
                gain.gain.value = 0.35;
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            }
        } catch(e) {}
    }

    // ===== UI Helpers =====

    function showListening() {
        recordingBar.classList.remove('mic-lost');
        recordingBarText.textContent = 'جاري التسجيل... اتكلم براحتك';
        statusText.textContent = 'بيسمعك...';
    }

    function showMicDisconnected() {
        recordingBar.classList.add('mic-lost');
        recordingBarText.textContent = 'الميكروفون اتفصل — وصّله واضغط الميكروفون تاني';
        statusText.textContent = 'الميكروفون اتفصل';
    }

    // ===== Proactive Restart =====

    var PROACTIVE_INTERVAL = 8000;

    function startProactiveTimer() {
        clearProactiveTimer();
        proactiveTimer = setTimeout(function() {
            if (!isRecording || !recognition) return;
            prefixText = inputText.value.trim();
            try { recognition.stop(); } catch(e) {}
        }, PROACTIVE_INTERVAL);
    }

    function resetProactiveTimer() {
        startProactiveTimer();
    }

    function clearProactiveTimer() {
        if (proactiveTimer) {
            clearTimeout(proactiveTimer);
            proactiveTimer = null;
        }
    }

    // ===== Speech Recognition =====

    function buildRecognition() {
        var r = new SpeechRecognition();
        r.continuous = true;
        r.interimResults = true;
        r.maxAlternatives = 3;
        r.lang = langSelect.value;

        r.onstart = function() {
            reconnectAttempts = 0;
            showListening();
            lastResultTime = Date.now();
            startProactiveTimer();
        };

        r.onresult = function(e) {
            lastResultTime = Date.now();
            resetProactiveTimer();
            rapidFailCount = 0;

            var sessionFinal = '';
            var interim = '';
            for (var i = 0; i < e.results.length; i++) {
                if (e.results[i].isFinal) {
                    sessionFinal += e.results[i][0].transcript;
                } else {
                    interim += e.results[i][0].transcript;
                }
            }

            var textToFix = prefixText;
            if (textToFix && sessionFinal) textToFix += ' ';
            textToFix += sessionFinal;

            var display = isArabicLang() ? fixEnglishTerms(textToFix) : textToFix;

            if (interim) {
                if (display) display += ' ';
                display += interim;
            }

            inputText.value = display;
            autoResize();
            inputText.scrollTop = inputText.scrollHeight;
            updateSendBtn();
        };

        r.onend = function() {
            if (!isRecording) return;
            clearProactiveTimer();

            prefixText = inputText.value.trim();

            var now = Date.now();
            if (now - lastFailTime < 1000) {
                rapidFailCount++;
            } else {
                rapidFailCount = 0;
            }
            lastFailTime = now;

            if (rapidFailCount > 15) {
                playBeep('failed');
                statusText.textContent = 'حصلت مشكلة — اضغط الميكروفون تاني';
                stopRecording();
                return;
            }

            recognition = null;
            recognition = buildRecognition();
            try {
                recognition.start();
            } catch(e) {
                setTimeout(function() {
                    if (!isRecording) return;
                    recognition = buildRecognition();
                    try { recognition.start(); } catch(e2) {
                        playBeep('failed');
                        stopRecording();
                    }
                }, 200);
            }
        };

        r.onerror = function(e) {
            if (e.error === 'not-allowed') {
                statusText.textContent = 'اسمح بالميكروفون من المتصفح';
                stopRecording();
                return;
            }
            if (e.error === 'no-speech') return;
        };

        return r;
    }

    // ===== Recording Control =====

    async function requestMicPermission() {
        if (micPermissionGranted) return true;
        try {
            var stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(function(t) { t.stop(); });
            micPermissionGranted = true;
            return true;
        } catch(e) {
            statusText.textContent = 'اسمح بالميكروفون من المتصفح';
            return false;
        }
    }

    async function startRecording() {
        var allowed = await requestMicPermission();
        if (!allowed) return;

        prefixText = inputText.value.trim();
        reconnectAttempts = 0;
        rapidFailCount = 0;

        if (recognition) {
            try { recognition.stop(); } catch(e) {}
            recognition = null;
        }

        try {
            micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            var track = micStream.getAudioTracks()[0];
            if (track) {
                track.onended = function() {
                    if (isRecording) {
                        playBeep('failed');
                        showMicDisconnected();
                        stopRecording();
                    }
                };
            }
        } catch(e) {}

        recognition = buildRecognition();

        isRecording = true;
        btnMic.classList.add('recording');
        btnMic.innerHTML = '&#9724;';
        recordingBar.classList.add('active');
        showListening();
        try { recognition.start(); } catch(e) {}
    }

    function stopRecording() {
        isRecording = false;
        reconnectAttempts = 0;
        rapidFailCount = 0;
        clearProactiveTimer();
        btnMic.classList.remove('recording');
        btnMic.innerHTML = '&#127908;';
        recordingBar.classList.remove('active', 'mic-lost');
        recordingBarText.textContent = 'جاري التسجيل... اتكلم براحتك';
        statusText.textContent = 'اضغط الميكروفون وابدأ اتكلم';
        if (recognition) {
            try { recognition.stop(); } catch(e) {}
            recognition = null;
        }
        if (micStream) {
            micStream.getTracks().forEach(function(t) { t.stop(); });
            micStream = null;
        }
        prefixText = inputText.value.trim();
    }

    btnMic.addEventListener('click', function() {
        if (isRecording) {
            stopRecording();
        } else {
            startRecording();
        }
    });

    // ===== Message Sending =====

    async function sendMessage() {
        var text = inputText.value.trim();
        if (!text) return;

        if (isRecording) stopRecording();

        emptyState.style.display = 'none';
        prefixText = '';

        var now = new Date();
        var time = now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });

        var msg = document.createElement('div');
        msg.className = 'message message-sent';

        var msgText = document.createElement('div');
        msgText.className = 'message-text';
        msgText.textContent = text;

        var meta = document.createElement('div');
        meta.className = 'message-meta';

        var timeEl = document.createElement('span');
        timeEl.className = 'message-time';
        timeEl.textContent = time;

        meta.appendChild(timeEl);
        msg.appendChild(msgText);
        msg.appendChild(meta);
        chatArea.appendChild(msg);

        inputText.value = '';
        autoResize();
        updateSendBtn();
        chatArea.scrollTop = chatArea.scrollHeight;

        try {
            await navigator.clipboard.writeText(text);
            var copied = document.createElement('span');
            copied.className = 'message-copied';
            copied.textContent = '✓ تم النسخ';
            meta.insertBefore(copied, timeEl);
            setTimeout(function() { copied.remove(); }, 2500);
        } catch(e) {
            fallbackCopy(text);
        }
    }

    function fallbackCopy(text) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
    }

    // ===== Event Listeners =====

    btnSend.addEventListener('click', sendMessage);

    inputText.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    function autoResize() {
        inputText.style.height = 'auto';
        inputText.style.height = Math.min(inputText.scrollHeight, 120) + 'px';
        inputText.scrollTop = inputText.scrollHeight;
    }

    function updateSendBtn() {
        btnSend.disabled = !inputText.value.trim();
    }

    inputText.addEventListener('input', function() {
        autoResize();
        updateSendBtn();
    });

    langSelect.addEventListener('change', function() {
        if (isRecording) {
            stopRecording();
            startRecording();
        }
    });

    btnClear.addEventListener('click', function() {
        chatArea.innerHTML = '';
        chatArea.appendChild(emptyState);
        emptyState.style.display = '';
        inputText.value = '';
        prefixText = '';
        autoResize();
        updateSendBtn();
    });
})();
</script>
</body>
</html>
